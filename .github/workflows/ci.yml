name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go for shfmt
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Bash linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.10.0

      - name: ShellCheck
        run: shellcheck --severity=error dna-analysis.sh src/**/*.sh tests/*.sh tests/helpers/*.sh

      - name: Check entrypoint formatting
        run: shfmt -d -i 4 -ci dna-analysis.sh

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install report dependencies
        run: python -m pip install -r requirements-ast.txt -r requirements-reporting.txt

      - name: Compile Python modules
        run: python -m compileall -q collectors renderers src/reports

      - name: Run test suite
        run: bash ./tests/run.sh
