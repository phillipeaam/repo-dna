name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install report dependencies
        run: python -m pip install matplotlib

      - name: Compile Python modules
        run: python -m compileall -q collectors renderers src/reports

      - name: Run test suite
        run: bash ./tests/run.sh
